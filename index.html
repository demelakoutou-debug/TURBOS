<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deriv Mini-Bot Turbos API v2</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #111; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1a1a1a; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #ff444f; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }
        h3 { color: #ccc; margin-top: 20px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .btn { background: #ff444f; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #e03a44; }
        .btn-logout { background: #555; margin-left: 10px; }
        
        .panel-trading { background: #222; padding: 15px; border-radius: 6px; margin-top: 15px; border: 1px solid #2a2a2a; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-row { display: flex; gap: 10px; }
        .form-row > div { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 14px; color: #aaa; }
        select, input[type="number"], input[type="text"] { background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; font-size: 15px; }
        select:focus, input:focus { border-color: #ff444f; outline: none; }
        
        .trade-actions { display: flex; gap: 15px; margin-top: 15px; }
        .btn-trade { flex: 1; padding: 15px; font-size: 18px; text-transform: uppercase; border: none; color: white; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-long { background: #2e7d32; }
        .btn-long:hover { background: #1b5e20; }
        .btn-short { background: #c62828; }
        .btn-short:hover { background: #b71c1c; }

        #log-box { background: #000; color: #0f0; padding: 15px; height: 300px; overflow-y: auto; font-family: monospace; border-radius: 4px; margin-top: 15px; font-size: 13px; border: 1px solid #333; }
        .status { font-weight: bold; padding: 5px; display: inline-block; border-radius: 3px; }
        .online { background: #2e7d32; }
        .offline { background: #c62828; }
    </style>
</head>
<body>

<div class="container">
    <h2>Deriv Bot Turbos (API v2 Hybride REST/WS)</h2>
    
    <div>
        <p>Statut WebSocket : <span id="status" class="status offline">Déconnecté</span></p>
        <button id="auth-btn" class="btn">Se connecter avec Deriv</button>
        <button id="logout-btn" class="btn btn-logout" style="display:none;">Déconnexion</button>
    </div>

    <div id="trading-panel" class="panel-trading" style="display: none;">
        <h3>Configuration Turbos Personnalisée</h3>
        
        <div class="form-group">
            <label for="account-select">Sélection du Compte (Nomenclature DOT / ROT)</label>
            <select id="account-select">
                </select>
        </div>

        <div class="form-group">
            <label for="market-select">Marché / Indice de Volatilité</label>
            <select id="market-select">
                <option value="R_10">Volatility 10 Index</option>
                <option value="R_25">Volatility 25 Index</option>
                <option value="R_50">Volatility 50 Index</option>
                <option value="R_75">Volatility 75 Index</option>
                <option value="R_100">Volatility 100 Index</option>
                <option value="1HZ10V">Volatility 10 (1s) Index</option>
                <option value="1HZ25V" selected>Volatility 25 (1s) Index</option>
                <option value="1HZ50V">Volatility 50 (1s) Index</option>
                <option value="1HZ75V">Volatility 75 (1s) Index</option>
                <option value="1HZ100V">Volatility 100 (1s) Index</option>
            </select>
        </div>

        <div class="form-row" style="margin-bottom: 15px;">
            <div>
                <label for="duration-unit">Unité de durée</label>
                <select id="duration-unit">
                    <option value="t" selected>Ticks</option>
                    <option value="s">Secondes</option>
                    <option value="m">Minutes</option>
                </select>
            </div>
            <div>
                <label for="duration-value">Valeur durée</label>
                <input type="number" id="duration-value" value="5" min="1">
            </div>
        </div>

        <div class="form-group">
            <label for="trade-barrier">Barrière Personnalisée (Valeur absolue ou Offset)</label>
            <input type="text" id="trade-barrier" value="10.50">
        </div>

        <div class="form-group">
            <label for="trade-stake">Stake ($)</label>
            <input type="number" id="trade-stake" value="1.00" step="0.5" min="0.35">
        </div>

        <div class="trade-actions">
            <button id="btn-long" class="btn-trade btn-long">▲ TURBOSLONG</button>
            <button id="btn-short" class="btn-trade btn-short">▼ TURBOSSHORT</button>
        </div>
    </div>

    <h3>Flux de Marché & Logs d'exécution</h3>
    <div id="log-box">Initialisation du système...</div>
</div>

<script>
    const CLIENT_ID = '33wQvUCQCGhOHXHJACSpO'; 
    const REDIRECT_URI = 'https://demelakoutou-debug.github.io/essaindex/'; 

    const authBtn = document.getElementById('auth-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const tradingPanel = document.getElementById('trading-panel');
    const accountSelect = document.getElementById('account-select');
    const marketSelect = document.getElementById('market-select');
    const durationUnitSelect = document.getElementById('duration-unit');
    const durationValueInput = document.getElementById('duration-value');
    const barrierInput = document.getElementById('trade-barrier');
    const stakeInput = document.getElementById('trade-stake');
    const btnLong = document.getElementById('btn-long');
    const btnShort = document.getElementById('btn-short');
    const statusEl = document.getElementById('status');
    const logBox = document.getElementById('log-box');

    let ws = null;
    let accessToken = null;
    let currentSymbol = '1HZ25V';

    function log(msg, color = '#0f0') {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color: ${color}">[${time}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // --- SÉCURITÉ PKCE ---
    function generateRandomString(length) {
        const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
        let text = '';
        for (let i = 0; i < length; i++) { text += possible.charAt(Math.floor(Math.random() * possible.length)); }
        return text;
    }

    async function generateCodeChallenge(codeVerifier) {
        const encoder = new TextEncoder();
        const data = encoder.encode(codeVerifier);
        const digest = await window.crypto.subtle.digest('SHA-256', data);
        return btoa(String.fromCharCode(...new Uint8Array(digest)))
            .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    authBtn.addEventListener('click', async () => {
        const state = generateRandomString(16);
        const codeVerifier = generateRandomString(64);
        const codeChallenge = await generateCodeChallenge(codeVerifier);

        sessionStorage.setItem('oauth_state', state);
        sessionStorage.setItem('oauth_verifier', codeVerifier);

        const scope = 'trade';
        const oauthUrl = `https://auth.deriv.com/oauth2/auth?response_type=code&client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=${scope}&state=${state}&code_challenge=${codeChallenge}&code_challenge_method=S256`;
        window.location.href = oauthUrl;
    });

    logoutBtn.addEventListener('click', () => {
        sessionStorage.clear();
        localStorage.clear();
        window.location.href = REDIRECT_URI;
    });

    // --- ACCÈS AUX COMPTES (REST) ---
    async function fetchDerivAccounts() {
        try {
            const response = await fetch('https://api.derivws.com/trading/v1/options/accounts', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Deriv-App-ID': CLIENT_ID }
            });
            if (!response.ok) throw new Error(`Erreur HTTP : ${response.status}`);
            const json = await response.json();
            const accounts = json.data || []; 
            accountSelect.innerHTML = "";

            if (accounts.length === 0) {
                await createDerivAccount('demo');
                return fetchDerivAccounts(); 
            }

            accounts.forEach(acc => {
                const option = document.createElement('option');
                option.value = acc.account_id; 
                let label = acc.account_type === 'demo' ? "Démo (DOT)" : "Réel (ROT)";
                option.text = `${label} - ${acc.account_id} (${acc.currency || 'USD'})`;
                accountSelect.appendChild(option);
            });

            tradingPanel.style.display = 'block';
            if(accountSelect.value) switchAccountSession(accountSelect.value);

        } catch (error) {
            log(`Impossible de récupérer vos comptes : ${error.message}`, "#ff1744");
        }
    }

    async function createDerivAccount(type) {
        try {
            await fetch('https://api.derivws.com/trading/v1/options/accounts', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Deriv-App-ID': CLIENT_ID, 'Content-Type': 'application/json' },
                body: JSON.stringify({ currency: "USD", group: "row", account_type: type })
            });
        } catch(e) { console.error(e); }
    }

    // --- GESTION DE SESSION OTP ET WS ---
    async function switchAccountSession(accountId) {
        if (ws) ws.close();
        log(`Connexion au compte ${accountId}...`, "#ffea00");

        try {
            const response = await fetch(`https://api.derivws.com/trading/v1/options/accounts/${accountId}/otp`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Deriv-App-ID': CLIENT_ID }
            });
            if (!response.ok) throw new Error("Erreur de rafraîchissement de session");
            const otpData = await response.json();
            const wsUrl = otpData.data?.url; 

            if (wsUrl) openAuthenticatedWebSocket(wsUrl);
        } catch (error) {
            log(`Échec OTP : ${error.message}`, "#ff1744");
        }
    }

    function openAuthenticatedWebSocket(wsUrl) {
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            statusEl.className = "status online";
            statusEl.innerText = "En ligne (Sécurisé)";
            currentSymbol = marketSelect.value;
            ws.send(JSON.stringify({ ticks: currentSymbol }));
            requestServerBarriers();
        };

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);

            if (data.msg_type === 'tick' && data.tick && data.tick.symbol === currentSymbol) {
                if (Math.random() > 0.92) { 
                    log(`[${marketSelect.options[marketSelect.selectedIndex].text}] Prix : ${data.tick.quote}`, "#fff");
                }
            }

            if (data.msg_type === 'contracts_for' && data.contracts_for) {
                const availableContracts = data.contracts_for.available || [];
                log(`[Serveur] Données indicatives de barrières reçues pour information.`, "#ffea00");
                availableContracts.forEach(c => {
                    if ((c.contract_type === 'TURBOLONG' || c.contract_type === 'TURBOSLONG') && c.available_barriers) {
                        log(`  ➔ Barrières suggérées Long : [${c.available_barriers.join(' | ')}]`, "#2e7d32");
                    }
                    if ((c.contract_type === 'TURBOSHORT' || c.contract_type === 'TURBOSSHORT') && c.available_barriers) {
                        log(`  ➔ Barrières suggérées Short : [${c.available_barriers.join(' | ')}]`, "#c62828");
                    }
                });
            }

            if (data.msg_type === 'proposal' && data.proposal) {
                log(`[Proposal] Proposition validée ! Prix de l'option : ${data.proposal.ask_price}$`, "#00e676");
                ws.send(JSON.stringify({
                    buy: data.proposal.id,
                    price: data.proposal.ask_price,
                    req_id: 2
                }));
            }

            if (data.error) {
                log(`❌ Erreur API : ${data.error.message}`, "#ff1744");
            } else if (data.msg_type === 'buy') {
                log(`✅ Contrat validé avec succès ! ID : ${data.buy.contract_id}`, "#00e676");
                log(`${data.buy.longcode}`, "#aaa");
            }
        };

        ws.onclose = () => {
            statusEl.className = "status offline";
            statusEl.innerText = "Déconnecté";
        };
    }

    function requestServerBarriers() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                contracts_for: currentSymbol,
                req_id: 10
            }));
        }
    }

    // --- ENVOI DU TRADE AVEC PRISE EN COMPTE DES DURÉES PERSONNALISÉES ---
    function triggerTurboProposal(contractType) {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
            log("Erreur : Le bot n'est pas connecté.", "#ff1744");
            return;
        }

        const stake = parseFloat(stakeInput.value);
        const customBarrier = barrierInput.value.trim();
        const durationValue = parseInt(durationValueInput.value);
        const durationUnit = durationUnitSelect.value;

        if (!customBarrier) {
            log("Erreur : Veuillez renseigner une valeur de barrière.", "#ff1744");
            return;
        }
        
        if (isNaN(durationValue) || durationValue < 1) {
            log("Erreur : Durée invalide.", "#ff1744");
            return;
        }

        log(`[Trade] Envoi de la demande | Type: ${contractType} | Durée : ${durationValue}${durationUnit} | Barrière : ${customBarrier} | Stake : ${stake}$`, "#ffea00");

        ws.send(JSON.stringify({
            proposal: 1,
            amount: stake,
            basis: 'stake',
            contract_type: contractType, 
            currency: 'USD',
            duration: durationValue,          // Nombre de Ticks, Sec, ou Min saisi
            duration_unit: durationUnit,    // 't', 's', ou 'm'
            barrier: customBarrier, 
            underlying_symbol: currentSymbol,
            req_id: 1
        }));
    }

    btnLong.addEventListener('click', () => triggerTurboProposal('TURBOSLONG'));
    btnShort.addEventListener('click', () => triggerTurboProposal('TURBOSSHORT'));

    marketSelect.addEventListener('change', (e) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ forget_all: 'ticks' }));
            currentSymbol = e.target.value;
            log(`Changement d'actif : ${marketSelect.options[marketSelect.selectedIndex].text}`, "#ffea00");
            ws.send(JSON.stringify({ ticks: currentSymbol }));
            requestServerBarriers(); 
        }
    });

    accountSelect.addEventListener('change', (e) => { switchAccountSession(e.target.value); });

    // --- CHARGEMENT CONTEXTUEL ---
    async function initBot() {
        logBox.innerHTML = "";
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');

        if (code && state) {
            try {
                const resp = await fetch('https://auth.deriv.com/oauth2/token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        grant_type: 'authorization_code',
                        client_id: CLIENT_ID,
                        code: code,
                        code_verifier: sessionStorage.getItem('oauth_verifier'),
                        redirect_uri: REDIRECT_URI
                    })
                });
                const tok = await resp.json();
                if (tok.access_token) {
                    localStorage.setItem('access_token', tok.access_token);
                    localStorage.setItem('is_logged', 'true');
                }
            } catch(err) { console.error(err); }
            window.history.replaceState({}, document.title, REDIRECT_URI);
        }

        if (localStorage.getItem('is_logged') === 'true') {
            accessToken = localStorage.getItem('access_token');
            authBtn.style.display = 'none';
            logoutBtn.style.display = 'inline-block';
            fetchDerivAccounts();
        }
    }

    initBot();
</script>

</body>
</html>
